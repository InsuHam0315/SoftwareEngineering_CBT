<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>기말 CBT 문제은행 | 소프트웨어공학 CBT</title><link rel="stylesheet" href="../assets/style.css"><script defer src="../assets/storage.js"></script><script defer src="../data/software_engineering_mock_01.js"></script><script defer src="../data/software_engineering_mock_02.js"></script><script defer src="../data/software_engineering_final_bank.js"></script><script defer src="../assets/cbt.js"></script></head><body data-base="../" data-bank="finalbank">
<a class="skip-link" href="#main">본문으로 건너뛰기</a><header id="site-header"></header><main id="main" class="wide-container"><div class="page-head"><span class="eyebrow">통합 문제은행</span><h1>기말 CBT 문제은행</h1><p>두 모의고사의 100문항을 전체 또는 범위·주제·태그별로 골라 풀 수 있습니다.</p></div>
<section id="cbt-app"><div class="card"><h2>문제집 구성</h2><div class="bank-filter"><select class="select" id="bank-range" aria-label="범위 필터"><option value="">전체 범위</option><option>중간고사</option><option>기말고사</option></select><select class="select" id="bank-topic" aria-label="주제 필터"><option value="">전체 주제</option></select><select class="select" id="bank-tag" aria-label="태그 필터"><option value="">전체 태그</option></select><button class="btn btn-primary" id="apply-bank-filter" type="button">이 조건으로 풀기</button></div><div class="actions"><button class="btn btn-primary btn-sm" id="random-order" type="button">문제 순서 랜덤</button><button class="btn btn-sm" id="restore-order" type="button">기본 순서 복원</button><button class="btn btn-sm" id="random-choices" type="button">선지 순서 랜덤</button><button class="btn btn-sm" id="restore-choices" type="button">선지 기본 복원</button></div><div class="quiz-stats"><div class="quiz-stat"><span>현재 문제집</span><strong id="cbt-total">100문항</strong></div><div class="quiz-stat"><span>진행률</span><strong id="progress-percent">0%</strong></div><div class="quiz-stat"><span>확인 완료</span><strong id="confirmed-count">0 / 100</strong></div><div class="quiz-stat"><span>정답 / 현재 정답률</span><strong><span id="correct-count">0문항</span> · <span id="current-score">0점</span></strong></div></div><div class="progress-track"><div class="progress-bar" id="cbt-progress"></div></div><p class="muted" id="cbt-live" aria-live="polite">기본값은 전체 100문항입니다. 중간고사만 선택하면 30문항, 기말고사만 선택하면 70문항입니다.</p></div><div class="quiz-layout section"><aside class="card palette-panel"><h2>문제 번호</h2><div class="palette" id="question-palette"></div><div class="palette-legend"><span><i class="legend-dot" style="background:#334155"></i>미풀이</span><span><i class="legend-dot" style="background:#2563eb"></i>선택 후 미확인</span><span><i class="legend-dot" style="background:#15803d"></i>정답</span><span><i class="legend-dot" style="background:#b91c1c"></i>오답</span></div></aside><section class="question-list" id="question-list" aria-label="기말 CBT 문제은행"></section></div><div class="floating-submit"><button class="btn btn-primary" id="save-record" type="button">현재 결과 기록 저장</button></div></section>
</main><footer id="site-footer"></footer></body></html>

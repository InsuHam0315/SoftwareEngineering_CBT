<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>로컬 로그인 | 소프트웨어공학 CBT</title><link rel="stylesheet" href="assets/style.css"><script defer src="assets/storage.js"></script><script defer src="assets/auth.js"></script></head><body data-base="">
<a class="skip-link" href="#main">본문으로 건너뛰기</a><header id="site-header"></header><main id="main" class="container"><div class="auth-shell"><div class="page-head"><span class="eyebrow">로컬 학습자 설정</span><h1>로컬 로그인</h1><p>서버 인증 없이 이름과 선택 식별자로 사용자별 CBT 기록을 구분합니다.</p></div><section class="card"><h2>현재 사용자</h2><div class="current-profile" id="current-profile"></div><div class="actions"><button class="btn btn-danger" id="logout-button" type="button">로그아웃</button></div></section><section class="card section"><h2>사용자 등록 또는 전환</h2><form id="login-form" class="auth-form"><label><span>사용자 이름 <b class="muted">(필수)</b></span><input class="input" name="name" maxlength="30" autocomplete="name" required placeholder="예: 함인수"></label><label><span>학번 또는 별명 <b class="muted">(선택)</b></span><input class="input" name="identifier" maxlength="30" placeholder="동명이인 기록 구분용"></label><button class="btn btn-primary" type="submit">이 사용자로 시작</button></form><p class="notice" id="login-message" aria-live="polite">프로필과 학습 기록은 이 브라우저의 localStorage에만 저장됩니다.</p></section><p class="muted">브라우저 데이터를 삭제하면 학습 기록도 함께 삭제됩니다.</p></div></main><footer id="site-footer"></footer></body></html>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">디자인 패턴 분류</title><desc id="desc">패턴은 완성 코드가 아니라 반복 문제의 설계 해법입니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">디자인 패턴 분류</text><text x="42" y="84" class="subtitle">패턴은 완성 코드가 아니라 반복 문제의 설계 해법입니다.</text>
  <g><rect x="55" y="145" width="250" height="190" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="145" width="8" height="190" rx="4" fill="#2563eb"/><text x="79" y="180" class="heading">생성 패턴</text><text class="detail"><tspan x="79" y="210">객체 생성 책임 분리</tspan><tspan x="79" y="234">Factory Method</tspan><tspan x="79" y="258">Singleton · Builder</tspan></text></g><g><rect x="355" y="145" width="250" height="190" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="355" y="145" width="8" height="190" rx="4" fill="#7c3aed"/><text x="379" y="180" class="heading">구조 패턴</text><text class="detail"><tspan x="379" y="210">객체·클래스 조합</tspan><tspan x="379" y="234">Adapter · Composite</tspan><tspan x="379" y="258">Decorator · Facade</tspan></text></g><g><rect x="655" y="145" width="250" height="190" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="655" y="145" width="8" height="190" rx="4" fill="#0891b2"/><text x="679" y="180" class="heading">행위 패턴</text><text class="detail"><tspan x="679" y="210">협력과 알고리즘 분리</tspan><tspan x="679" y="234">Observer · Strategy</tspan><tspan x="679" y="258">Command · State</tspan></text></g>
  <text x="42" y="470" class="footer">문제의 핵심이 생성·구조·행위 중 어디에 있는지 먼저 판별하세요.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">폭포수 모델과 V 모델</title><desc id="desc">개발 단계와 대응 테스트 수준을 연결해 보세요.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">폭포수 모델과 V 모델</text><text x="42" y="84" class="subtitle">개발 단계와 대응 테스트 수준을 연결해 보세요.</text>
  <path d="M235 175 L280 240" class="arrow" marker-end="url(#arrow)"/><text x="257.5" y="199.5" class="link">단계 진행</text><path d="M460 250 L520 325" class="arrow" marker-end="url(#arrow)"/><text x="490.0" y="279.5" class="link">단계 진행</text><path d="M690 325 L735 390" class="arrow" marker-end="url(#arrow)"/><text x="712.5" y="349.5" class="link">코딩</text><g><rect x="45" y="130" width="190" height="90" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="45" y="130" width="8" height="90" rx="4" fill="#2563eb"/><text x="69" y="165" class="heading">요구사항</text><text class="detail"><tspan x="69" y="195">인수 테스트와 대응</tspan></text></g><g><rect x="280" y="205" width="180" height="90" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="280" y="205" width="8" height="90" rx="4" fill="#7c3aed"/><text x="304" y="240" class="heading">시스템 설계</text><text class="detail"><tspan x="304" y="270">시스템 테스트와 대응</tspan></text></g><g><rect x="520" y="280" width="170" height="90" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="520" y="280" width="8" height="90" rx="4" fill="#0891b2"/><text x="544" y="315" class="heading">상세 설계</text><text class="detail"><tspan x="544" y="345">통합 테스트와 대응</tspan></text></g><g><rect x="735" y="350" width="180" height="80" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="735" y="350" width="8" height="80" rx="4" fill="#059669"/><text x="759" y="385" class="heading">구현</text><text class="detail"><tspan x="759" y="415">단위 테스트 출발점</tspan></text></g>
  <text x="42" y="470" class="footer">폭포수는 순차성과 문서를, V 모델은 개발 단계별 테스트 대응을 강조합니다.</text>
</svg>
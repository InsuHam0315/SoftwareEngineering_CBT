<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">소프트웨어공학의 목적</title><desc id="desc">복잡성을 체계적으로 관리해 품질과 생산성을 높입니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">소프트웨어공학의 목적</text><text x="42" y="84" class="subtitle">복잡성을 체계적으로 관리해 품질과 생산성을 높입니다.</text>
  <path d="M275 195 L370 195" class="arrow" marker-end="url(#arrow)"/><text x="322.5" y="187.0" class="link">대응</text><path d="M590 195 L685 195" class="arrow" marker-end="url(#arrow)"/><text x="637.5" y="187.0" class="link">목표</text><path d="M480 255 L480 315" class="arrow" marker-end="url(#arrow)"/><text x="480.0" y="277.0" class="link">지원</text><g><rect x="55" y="135" width="220" height="120" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="135" width="8" height="120" rx="4" fill="#2563eb"/><text x="79" y="170" class="heading">소프트웨어 위기</text><text class="detail"><tspan x="79" y="200">복잡도 · 지연 · 비용 초과</tspan></text></g><g><rect x="370" y="135" width="220" height="120" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="370" y="135" width="8" height="120" rx="4" fill="#7c3aed"/><text x="394" y="170" class="heading">공학적 접근</text><text class="detail"><tspan x="394" y="200">프로세스 · 방법 · 도구</tspan></text></g><g><rect x="685" y="135" width="220" height="120" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="685" y="135" width="8" height="120" rx="4" fill="#0891b2"/><text x="709" y="170" class="heading">품질·생산성</text><text class="detail"><tspan x="709" y="200">예측 가능하고 유지 가능한 결과</tspan></text></g><g><rect x="370" y="315" width="220" height="90" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="370" y="315" width="8" height="90" rx="4" fill="#059669"/><text x="394" y="350" class="heading">품질보증</text><text class="detail"><tspan x="394" y="380">예방 중심의 전 생명주기 활동</tspan></text></g>
  <text x="42" y="470" class="footer">핵심 흐름과 구별 기준을 함께 확인하세요.</text>

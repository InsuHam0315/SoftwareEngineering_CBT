<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">유지보수의 네 유형</title><desc id="desc">배포 후 변경 목적에 따라 유형을 구분합니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">유지보수의 네 유형</text><text x="42" y="84" class="subtitle">배포 후 변경 목적에 따라 유형을 구분합니다.</text>
  <g><rect x="55" y="135" width="380" height="110" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="135" width="8" height="110" rx="4" fill="#2563eb"/><text x="79" y="170" class="heading">Corrective 교정</text><text class="detail"><tspan x="79" y="200">발견된 결함을 수정</tspan></text></g><g><rect x="525" y="135" width="380" height="110" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="525" y="135" width="8" height="110" rx="4" fill="#7c3aed"/><text x="549" y="170" class="heading">Adaptive 적응</text><text class="detail"><tspan x="549" y="200">OS·법규·환경 변화에 대응</tspan></text></g><g><rect x="55" y="285" width="380" height="110" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="55" y="285" width="8" height="110" rx="4" fill="#0891b2"/><text x="79" y="320" class="heading">Perfective 완전</text><text class="detail"><tspan x="79" y="350">기능·성능·사용성 개선</tspan></text></g><g><rect x="525" y="285" width="380" height="110" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="525" y="285" width="8" height="110" rx="4" fill="#059669"/><text x="549" y="320" class="heading">Preventive 예방</text><text class="detail"><tspan x="549" y="350">미래 장애를 줄이는 구조 개선</tspan></text></g>
  <text x="42" y="470" class="footer">유지보수는 오류 수정만이 아니라 적응·개선·예방까지 포함합니다.</text>
</svg>
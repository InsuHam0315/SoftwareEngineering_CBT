<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">점증적 개발과 반복적 개발</title><desc id="desc">범위를 더하는가, 같은 골격을 다듬는가를 구분합니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">점증적 개발과 반복적 개발</text><text x="42" y="84" class="subtitle">범위를 더하는가, 같은 골격을 다듬는가를 구분합니다.</text>
  <g><rect x="55" y="130" width="250" height="80" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="130" width="8" height="80" rx="4" fill="#2563eb"/><text x="79" y="165" class="heading">점증 1</text><text class="detail"><tspan x="79" y="195">회원 기능</tspan></text></g><g><rect x="55" y="230" width="330" height="80" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="55" y="230" width="8" height="80" rx="4" fill="#7c3aed"/><text x="79" y="265" class="heading">점증 2</text><text class="detail"><tspan x="79" y="295">회원 + 주문</tspan></text></g><g><rect x="55" y="330" width="410" height="80" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="55" y="330" width="8" height="80" rx="4" fill="#0891b2"/><text x="79" y="365" class="heading">점증 3</text><text class="detail"><tspan x="79" y="395">회원 + 주문 + 결제</tspan></text></g><g><rect x="555" y="130" width="330" height="80" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="555" y="130" width="8" height="80" rx="4" fill="#059669"/><text x="579" y="165" class="heading">반복 1</text><text class="detail"><tspan x="579" y="195">전체 골격의 단순 버전</tspan></text></g><g><rect x="555" y="230" width="330" height="80" rx="18" fill="#111c35" stroke="#d97706" stroke-width="2"/><rect x="555" y="230" width="8" height="80" rx="4" fill="#d97706"/><text x="579" y="265" class="heading">반복 2</text><text class="detail"><tspan x="579" y="295">동일 골격 기능 정교화</tspan></text></g><g><rect x="555" y="330" width="330" height="80" rx="18" fill="#111c35" stroke="#dc2626" stroke-width="2"/><rect x="555" y="330" width="8" height="80" rx="4" fill="#dc2626"/><text x="579" y="365" class="heading">반복 3</text><text class="detail"><tspan x="579" y="395">품질·성능까지 개선</tspan></text></g>
  <text x="42" y="470" class="footer">점증=기능 범위 증가, 반복=전체 골격의 완성도 증가. 실제로는 함께 사용합니다.</text>
</svg>
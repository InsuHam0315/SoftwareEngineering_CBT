<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">UML 다이어그램 지도</title><desc id="desc">구조와 행위를 보는 관점을 먼저 구분하세요.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">UML 다이어그램 지도</text><text x="42" y="84" class="subtitle">구조와 행위를 보는 관점을 먼저 구분하세요.</text>
  <path d="M245 220 L160 250" class="arrow" marker-end="url(#arrow)"/><text x="202.5" y="227.0" class="link">구체화</text><path d="M715 220 L620 250" class="arrow" marker-end="url(#arrow)"/><text x="667.5" y="227.0" class="link">구체화</text><g><rect x="55" y="130" width="380" height="90" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="130" width="8" height="90" rx="4" fill="#2563eb"/><text x="79" y="165" class="heading">구조 다이어그램</text><text class="detail"><tspan x="79" y="195">정적인 구성과 배치</tspan></text></g><g><rect x="75" y="250" width="170" height="120" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="75" y="250" width="8" height="120" rx="4" fill="#7c3aed"/><text x="99" y="285" class="heading">클래스·컴포넌트</text><text class="detail"><tspan x="99" y="315">타입·모듈 관계</tspan></text></g><g><rect x="265" y="250" width="170" height="120" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="265" y="250" width="8" height="120" rx="4" fill="#0891b2"/><text x="289" y="285" class="heading">배치</text><text class="detail"><tspan x="289" y="315">실행 노드와 산출물</tspan></text></g><g><rect x="525" y="130" width="380" height="90" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="525" y="130" width="8" height="90" rx="4" fill="#059669"/><text x="549" y="165" class="heading">행위 다이어그램</text><text class="detail"><tspan x="549" y="195">시간·흐름·상태 변화</tspan></text></g><g><rect x="525" y="250" width="170" height="120" rx="18" fill="#111c35" stroke="#d97706" stroke-width="2"/><rect x="525" y="250" width="8" height="120" rx="4" fill="#d97706"/><text x="549" y="285" class="heading">유스케이스·활동</text><text class="detail"><tspan x="549" y="315">사용 목표·업무 흐름</tspan></text></g><g><rect x="715" y="250" width="190" height="120" rx="18" fill="#111c35" stroke="#dc2626" stroke-width="2"/><rect x="715" y="250" width="8" height="120" rx="4" fill="#dc2626"/><text x="739" y="285" class="heading">순차·상태</text><text class="detail"><tspan x="739" y="315">메시지 시간·상태 전이</tspan></text></g>
  <text x="42" y="470" class="footer">시험에서는 ‘무엇을 표현하는가’를 보고 다이어그램을 선택합니다.</text>
</svg>
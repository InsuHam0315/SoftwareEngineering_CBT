<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">요구사항의 두 축</title><desc id="desc">무엇을 하는가와 얼마나 잘해야 하는가를 구분합니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">요구사항의 두 축</text><text x="42" y="84" class="subtitle">무엇을 하는가와 얼마나 잘해야 하는가를 구분합니다.</text>
  <path d="M250 315 L390 350" class="arrow" marker-end="url(#arrow)"/><text x="320.0" y="324.5" class="link">명세</text><path d="M710 315 L570 350" class="arrow" marker-end="url(#arrow)"/><text x="640.0" y="324.5" class="link">명세</text><g><rect x="70" y="135" width="360" height="180" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="70" y="135" width="8" height="180" rx="4" fill="#2563eb"/><text x="94" y="170" class="heading">기능 요구사항</text><text class="detail"><tspan x="94" y="200">행동·서비스·입출력</tspan><tspan x="94" y="224">예: 수강 신청을 취소한다</tspan></text></g><g><rect x="530" y="135" width="360" height="180" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="530" y="135" width="8" height="180" rx="4" fill="#7c3aed"/><text x="554" y="170" class="heading">비기능 요구사항</text><text class="detail"><tspan x="554" y="200">성능·보안·가용성·제약</tspan><tspan x="554" y="224">예: 조회는 2초 안에 응답한다</tspan></text></g><g><rect x="300" y="350" width="360" height="80" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="300" y="350" width="8" height="80" rx="4" fill="#0891b2"/><text x="324" y="385" class="heading">SRS</text><text class="detail"><tspan x="324" y="415">검증 가능하고 추적 가능한 문장으로 명세</tspan></text></g>
  <text x="42" y="470" class="footer">판별 질문: ‘무엇을?’이면 기능, ‘어느 수준으로?’이면 비기능입니다.</text>
</svg>
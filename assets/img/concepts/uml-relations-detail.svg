<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">UML 관계 기호</title><desc id="desc">선 모양, 화살촉, 생명주기를 함께 기억하세요.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">UML 관계 기호</text><text x="42" y="84" class="subtitle">선 모양, 화살촉, 생명주기를 함께 기억하세요.</text>
  <g><rect x="40" y="125" width="270" height="80" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="40" y="125" width="8" height="80" rx="4" fill="#2563eb"/><text x="64" y="160" class="heading">Association ─</text><text class="detail"><tspan x="64" y="190">지속적인 구조적 연결</tspan></text></g><g><rect x="345" y="125" width="270" height="80" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="345" y="125" width="8" height="80" rx="4" fill="#7c3aed"/><text x="369" y="160" class="heading">Dependency ⇢</text><text class="detail"><tspan x="369" y="190">일시 사용·변경 영향</tspan></text></g><g><rect x="650" y="125" width="270" height="80" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="650" y="125" width="8" height="80" rx="4" fill="#0891b2"/><text x="674" y="160" class="heading">Generalization —▷</text><text class="detail"><tspan x="674" y="190">is-a, 상속</tspan></text></g><g><rect x="40" y="260" width="270" height="100" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="40" y="260" width="8" height="100" rx="4" fill="#059669"/><text x="64" y="295" class="heading">Aggregation ◇—</text><text class="detail"><tspan x="64" y="325">빈 마름모·부분 독립</tspan></text></g><g><rect x="345" y="260" width="270" height="100" rx="18" fill="#111c35" stroke="#d97706" stroke-width="2"/><rect x="345" y="260" width="8" height="100" rx="4" fill="#d97706"/><text x="369" y="295" class="heading">Composition ◆—</text><text class="detail"><tspan x="369" y="325">채운 마름모·생명주기 공유</tspan></text></g><g><rect x="650" y="260" width="270" height="100" rx="18" fill="#111c35" stroke="#dc2626" stroke-width="2"/><rect x="650" y="260" width="8" height="100" rx="4" fill="#dc2626"/><text x="674" y="295" class="heading">Realization --▷</text><text class="detail"><tspan x="674" y="325">인터페이스 계약 구현</tspan></text></g>
  <text x="42" y="470" class="footer">마름모는 전체 쪽, 빈 삼각형은 상위 타입·인터페이스 쪽에 둡니다.</text>
</svg>
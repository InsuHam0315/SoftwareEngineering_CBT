<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">애자일·스크럼 흐름</title><desc id="desc">짧은 반복마다 가치 있는 증가분과 피드백을 만듭니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">애자일·스크럼 흐름</text><text x="42" y="84" class="subtitle">짧은 반복마다 가치 있는 증가분과 피드백을 만듭니다.</text>
  <path d="M175 210 L195 210" class="arrow" marker-end="url(#arrow)"/><path d="M345 210 L365 210" class="arrow" marker-end="url(#arrow)"/><path d="M515 210 L535 210" class="arrow" marker-end="url(#arrow)"/><path d="M685 195 L705 160" class="arrow" marker-end="url(#arrow)"/><text x="695.0" y="169.5" class="link">제품</text><path d="M685 225 L705 320" class="arrow" marker-end="url(#arrow)"/><text x="695.0" y="264.5" class="link">과정</text><g><rect x="25" y="160" width="150" height="100" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="25" y="160" width="8" height="100" rx="4" fill="#2563eb"/><text x="49" y="195" class="heading">Product Backlog</text><text class="detail"><tspan x="49" y="225">제품 전체 우선순위</tspan></text></g><g><rect x="195" y="160" width="150" height="100" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="195" y="160" width="8" height="100" rx="4" fill="#7c3aed"/><text x="219" y="195" class="heading">Sprint 계획</text><text class="detail"><tspan x="219" y="225">목표와 항목 선택</tspan></text></g><g><rect x="365" y="160" width="150" height="100" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="365" y="160" width="8" height="100" rx="4" fill="#0891b2"/><text x="389" y="195" class="heading">Sprint Backlog</text><text class="detail"><tspan x="389" y="225">이번 반복 실행 계획</tspan></text></g><g><rect x="535" y="160" width="150" height="100" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="535" y="160" width="8" height="100" rx="4" fill="#059669"/><text x="559" y="195" class="heading">Sprint</text><text class="detail"><tspan x="559" y="225">개발 + Daily Scrum</tspan></text></g><g><rect x="705" y="115" width="220" height="90" rx="18" fill="#111c35" stroke="#d97706" stroke-width="2"/><rect x="705" y="115" width="8" height="90" rx="4" fill="#d97706"/><text x="729" y="150" class="heading">Sprint Review</text><text class="detail"><tspan x="729" y="180">증가분·제품 방향 검토</tspan></text></g><g><rect x="705" y="275" width="220" height="90" rx="18" fill="#111c35" stroke="#dc2626" stroke-width="2"/><rect x="705" y="275" width="8" height="90" rx="4" fill="#dc2626"/><text x="729" y="310" class="heading">Retrospective</text><text class="detail"><tspan x="729" y="340">일하는 방식 개선</tspan></text></g>
  <text x="42" y="470" class="footer">Review는 제품, Retrospective는 팀의 협업 방식을 살핍니다.</text>
</svg>
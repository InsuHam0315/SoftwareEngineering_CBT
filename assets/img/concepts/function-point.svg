<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">기능 점수 5유형</title><desc id="desc">애플리케이션 경계를 기준으로 데이터의 방향과 가공 여부를 봅니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">기능 점수 5유형</text><text x="42" y="84" class="subtitle">애플리케이션 경계를 기준으로 데이터의 방향과 가공 여부를 봅니다.</text>
  <path d="M265 175 L385 210" class="arrow" marker-end="url(#arrow)"/><text x="325.0" y="184.5" class="link">들어옴</text><path d="M385 290 L265 300" class="arrow" marker-end="url(#arrow)"/><text x="325.0" y="287.0" class="link">나감</text><path d="M265 415 L385 345" class="arrow" marker-end="url(#arrow)"/><text x="325.0" y="372.0" class="link">질의</text><path d="M615 270 L695 265" class="arrow" marker-end="url(#arrow)"/><text x="655.0" y="259.5" class="link">참조</text><g><rect x="55" y="130" width="210" height="90" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="130" width="8" height="90" rx="4" fill="#2563eb"/><text x="79" y="165" class="heading">EI 입력</text><text class="detail"><tspan x="79" y="195">외부 → 내부, CUD</tspan></text></g><g><rect x="55" y="255" width="210" height="90" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="55" y="255" width="8" height="90" rx="4" fill="#7c3aed"/><text x="79" y="290" class="heading">EO 출력</text><text class="detail"><tspan x="79" y="320">계산·파생 후 외부로</tspan></text></g><g><rect x="55" y="380" width="210" height="70" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="55" y="380" width="8" height="70" rx="4" fill="#0891b2"/><text x="79" y="415" class="heading">EQ 조회</text><text class="detail"><tspan x="79" y="445">가공 없는 검색</tspan></text></g><g><rect x="385" y="160" width="230" height="220" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="385" y="160" width="8" height="220" rx="4" fill="#059669"/><text x="409" y="195" class="heading">애플리케이션 경계</text><text class="detail"><tspan x="409" y="225">ILF</tspan><tspan x="409" y="249">내부가 유지 책임</tspan></text></g><g><rect x="695" y="205" width="210" height="120" rx="18" fill="#111c35" stroke="#d97706" stroke-width="2"/><rect x="695" y="205" width="8" height="120" rx="4" fill="#d97706"/><text x="719" y="240" class="heading">EIF</text><text class="detail"><tspan x="719" y="270">외부가 유지</tspan><tspan x="719" y="294">내부는 참조</tspan></text></g>
  <text x="42" y="470" class="footer">EI·EO·EQ는 트랜잭션 기능, ILF·EIF는 데이터 기능입니다.</text>
</svg>
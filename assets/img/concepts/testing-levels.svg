<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">테스트 수준</title><desc id="desc">시험 대상의 범위가 작은 단위에서 전체 업무로 넓어집니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">테스트 수준</text><text x="42" y="84" class="subtitle">시험 대상의 범위가 작은 단위에서 전체 업무로 넓어집니다.</text>
  <path d="M225 360 L255 330" class="arrow" marker-end="url(#arrow)"/><text x="240.0" y="337.0" class="link">범위 확대</text><path d="M445 330 L475 295" class="arrow" marker-end="url(#arrow)"/><path d="M665 295 L695 260" class="arrow" marker-end="url(#arrow)"/><g><rect x="35" y="310" width="190" height="100" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="35" y="310" width="8" height="100" rx="4" fill="#2563eb"/><text x="59" y="345" class="heading">단위 테스트</text><text class="detail"><tspan x="59" y="375">함수·클래스·모듈</tspan></text></g><g><rect x="255" y="250" width="190" height="160" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="255" y="250" width="8" height="160" rx="4" fill="#7c3aed"/><text x="279" y="285" class="heading">통합 테스트</text><text class="detail"><tspan x="279" y="315">인터페이스·협력</tspan></text></g><g><rect x="475" y="185" width="190" height="225" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="475" y="185" width="8" height="225" rx="4" fill="#0891b2"/><text x="499" y="220" class="heading">시스템 테스트</text><text class="detail"><tspan x="499" y="250">전체 시스템·비기능</tspan></text></g><g><rect x="695" y="120" width="230" height="290" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="695" y="120" width="8" height="290" rx="4" fill="#059669"/><text x="719" y="155" class="heading">인수 테스트</text><text class="detail"><tspan x="719" y="185">사용자 업무·인수 기준</tspan></text></g>
  <text x="42" y="470" class="footer">테스트 케이스는 입력·절차·기대 결과를 구체화하고, 시나리오는 업무 흐름을 넓게 봅니다.</text>
</svg>
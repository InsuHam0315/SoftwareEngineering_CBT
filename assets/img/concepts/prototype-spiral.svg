<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">프로토타입과 나선형</title><desc id="desc">두 모델의 반복 목적은 서로 다릅니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">프로토타입과 나선형</text><text x="42" y="84" class="subtitle">두 모델의 반복 목적은 서로 다릅니다.</text>
  <path d="M180 230 L180 300" class="arrow" marker-end="url(#arrow)"/><text x="180.0" y="257.0" class="link">확인</text><path d="M180 300 L180 230" class="arrow" marker-end="url(#arrow)"/><text x="180.0" y="257.0" class="link">수정</text><path d="M700 165 L720 245" class="arrow" marker-end="url(#arrow)"/><path d="M820 290 L700 365" class="arrow" marker-end="url(#arrow)"/><path d="M500 365 L600 210" class="arrow" marker-end="url(#arrow)"/><text x="550.0" y="279.5" class="link">다음 주기</text><g><rect x="55" y="130" width="250" height="100" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="130" width="8" height="100" rx="4" fill="#2563eb"/><text x="79" y="165" class="heading">빠른 시제품</text><text class="detail"><tspan x="79" y="195">화면·핵심 흐름 구현</tspan></text></g><g><rect x="55" y="300" width="250" height="100" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="55" y="300" width="8" height="100" rx="4" fill="#7c3aed"/><text x="79" y="335" class="heading">사용자 피드백</text><text class="detail"><tspan x="79" y="365">불명확한 요구 구체화</tspan></text></g><g><rect x="500" y="120" width="200" height="90" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="500" y="120" width="8" height="90" rx="4" fill="#0891b2"/><text x="524" y="155" class="heading">목표 설정</text><text class="detail"><tspan x="524" y="185">이번 반복의 목표</tspan></text></g><g><rect x="720" y="200" width="200" height="90" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="720" y="200" width="8" height="90" rx="4" fill="#059669"/><text x="744" y="235" class="heading">위험 분석</text><text class="detail"><tspan x="744" y="265">식별·평가·대응</tspan></text></g><g><rect x="500" y="320" width="200" height="90" rx="18" fill="#111c35" stroke="#d97706" stroke-width="2"/><rect x="500" y="320" width="8" height="90" rx="4" fill="#d97706"/><text x="524" y="355" class="heading">개발·평가</text><text class="detail"><tspan x="524" y="385">구현 후 다음 반복</tspan></text></g>
  <text x="42" y="470" class="footer">프로토타입=요구 발견, 나선형=반복마다 위험 관리.</text>
</svg>
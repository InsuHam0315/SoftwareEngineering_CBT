<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">설계 원리와 아키텍처</title><desc id="desc">큰 구조에서 책임이 명확한 모듈로 내려갑니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">설계 원리와 아키텍처</text><text x="42" y="84" class="subtitle">큰 구조에서 책임이 명확한 모듈로 내려갑니다.</text>
  <path d="M275 190 L360 190" class="arrow" marker-end="url(#arrow)"/><text x="317.5" y="182.0" class="link">구조화</text><path d="M600 190 L685 190" class="arrow" marker-end="url(#arrow)"/><text x="642.5" y="182.0" class="link">분해</text><path d="M800 245 L620 315" class="arrow" marker-end="url(#arrow)"/><text x="710.0" y="272.0" class="link">품질</text><path d="M800 245 L355 315" class="arrow" marker-end="url(#arrow)"/><text x="577.5" y="272.0" class="link">품질</text><g><rect x="45" y="135" width="230" height="110" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="45" y="135" width="8" height="110" rx="4" fill="#2563eb"/><text x="69" y="170" class="heading">설계 원리</text><text class="detail"><tspan x="69" y="200">추상화·정보 은닉·모듈화</tspan></text></g><g><rect x="360" y="135" width="240" height="110" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="360" y="135" width="8" height="110" rx="4" fill="#7c3aed"/><text x="384" y="170" class="heading">아키텍처</text><text class="detail"><tspan x="384" y="200">구성요소·인터페이스·제약</tspan></text></g><g><rect x="685" y="135" width="230" height="110" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="685" y="135" width="8" height="110" rx="4" fill="#0891b2"/><text x="709" y="170" class="heading">모듈</text><text class="detail"><tspan x="709" y="200">한 책임·명확한 경계</tspan></text></g><g><rect x="250" y="315" width="210" height="90" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="250" y="315" width="8" height="90" rx="4" fill="#059669"/><text x="274" y="350" class="heading">고응집</text><text class="detail"><tspan x="274" y="380">내부 책임은 밀접하게</tspan></text></g><g><rect x="515" y="315" width="210" height="90" rx="18" fill="#111c35" stroke="#d97706" stroke-width="2"/><rect x="515" y="315" width="8" height="90" rx="4" fill="#d97706"/><text x="539" y="350" class="heading">저결합</text><text class="detail"><tspan x="539" y="380">모듈 간 의존은 적게</tspan></text></g>
  <text x="42" y="470" class="footer">핵심 흐름과 구별 기준을 함께 확인하세요.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">프로그램과 소프트웨어</title><desc id="desc">코드는 소프트웨어를 구성하는 한 부분입니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">프로그램과 소프트웨어</text><text x="42" y="84" class="subtitle">코드는 소프트웨어를 구성하는 한 부분입니다.</text>
  <path d="M275 205 L365 205" class="arrow" marker-end="url(#arrow)"/><text x="320.0" y="197.0" class="link">포함</text><path d="M615 205 L695 205" class="arrow" marker-end="url(#arrow)"/><text x="655.0" y="197.0" class="link">함께 관리</text><g><rect x="55" y="145" width="220" height="120" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="145" width="8" height="120" rx="4" fill="#2563eb"/><text x="79" y="180" class="heading">프로그램</text><text class="detail"><tspan x="79" y="210">명령어 · 원시 코드</tspan></text></g><g><rect x="365" y="120" width="250" height="170" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="365" y="120" width="8" height="170" rx="4" fill="#7c3aed"/><text x="389" y="155" class="heading">소프트웨어</text><text class="detail"><tspan x="389" y="185">프로그램 + 데이터 + 문서</tspan></text></g><g><rect x="695" y="145" width="210" height="120" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="695" y="145" width="8" height="120" rx="4" fill="#0891b2"/><text x="719" y="180" class="heading">운영 산출물</text><text class="detail"><tspan x="719" y="210">테스트 · 매뉴얼 · 설정</tspan></text></g>
  <text x="42" y="470" class="footer">시험 함정: 소프트웨어를 코드만으로 한정하면 틀립니다.</text>
</svg>
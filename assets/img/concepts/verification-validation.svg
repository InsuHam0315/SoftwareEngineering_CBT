<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Verification과 Validation</title><desc id="desc">명세 적합성과 사용자 필요 충족을 다른 질문으로 확인합니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">Verification과 Validation</text><text x="42" y="84" class="subtitle">명세 적합성과 사용자 필요 충족을 다른 질문으로 확인합니다.</text>
  <path d="M235 330 L410 360" class="arrow" marker-end="url(#arrow)"/><text x="322.5" y="337.0" class="link">품질</text><path d="M725 330 L550 360" class="arrow" marker-end="url(#arrow)"/><text x="637.5" y="337.0" class="link">가치</text><g><rect x="55" y="140" width="360" height="190" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="55" y="140" width="8" height="190" rx="4" fill="#2563eb"/><text x="79" y="175" class="heading">Verification</text><text class="detail"><tspan x="79" y="205">제품을 올바르게 만드는가?</tspan><tspan x="79" y="229">SRS·설계·코드의 일관성</tspan><tspan x="79" y="253">리뷰·정적 분석·단계별 시험</tspan></text></g><g><rect x="545" y="140" width="360" height="190" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="545" y="140" width="8" height="190" rx="4" fill="#7c3aed"/><text x="569" y="175" class="heading">Validation</text><text class="detail"><tspan x="569" y="205">올바른 제품을 만드는가?</tspan><tspan x="569" y="229">실제 사용자 요구 충족</tspan><tspan x="569" y="253">시스템·인수 시험과 피드백</tspan></text></g><g><rect x="335" y="360" width="290" height="70" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="335" y="360" width="8" height="70" rx="4" fill="#0891b2"/><text x="359" y="395" class="heading">둘 다 필요</text><text class="detail"><tspan x="359" y="425">명세 적합 ≠ 사용자 만족</tspan></text></g>
  <text x="42" y="470" class="footer">기억: Verification=right하게, Validation=right product를.</text>
</svg>
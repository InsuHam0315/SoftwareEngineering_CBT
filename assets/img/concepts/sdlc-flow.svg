<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">SDLC 기본 흐름</title><desc id="desc">각 단계는 다음 단계의 입력이 되는 산출물을 만듭니다.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071126"/><stop offset="1" stop-color="#0f172a"/></linearGradient><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/></marker></defs>
  <style>.title{fill:#f8fafc;font:700 30px system-ui,sans-serif}.subtitle{fill:#94a3b8;font:16px system-ui,sans-serif}.heading{fill:#e2e8f0;font:700 18px system-ui,sans-serif}.detail{fill:#a5b4c7;font:14px system-ui,sans-serif}.arrow{stroke:#7dd3fc;stroke-width:2.5;fill:none}.link{fill:#67e8f9;font:13px system-ui,sans-serif;text-anchor:middle}.footer{fill:#93c5fd;font:14px system-ui,sans-serif}</style>
  <rect width="960" height="500" rx="28" fill="url(#bg)"/><text x="42" y="55" class="title">SDLC 기본 흐름</text><text x="42" y="84" class="subtitle">각 단계는 다음 단계의 입력이 되는 산출물을 만듭니다.</text>
  <path d="M160 200 L185 200" class="arrow" marker-end="url(#arrow)"/><path d="M315 200 L340 200" class="arrow" marker-end="url(#arrow)"/><path d="M470 200 L495 200" class="arrow" marker-end="url(#arrow)"/><path d="M625 200 L650 200" class="arrow" marker-end="url(#arrow)"/><path d="M780 200 L805 200" class="arrow" marker-end="url(#arrow)"/><g><rect x="30" y="150" width="130" height="100" rx="18" fill="#111c35" stroke="#2563eb" stroke-width="2"/><rect x="30" y="150" width="8" height="100" rx="4" fill="#2563eb"/><text x="54" y="185" class="heading">요구 분석</text><text class="detail"><tspan x="54" y="215">SRS</tspan></text></g><g><rect x="185" y="150" width="130" height="100" rx="18" fill="#111c35" stroke="#7c3aed" stroke-width="2"/><rect x="185" y="150" width="8" height="100" rx="4" fill="#7c3aed"/><text x="209" y="185" class="heading">설계</text><text class="detail"><tspan x="209" y="215">구조·DB·UI</tspan></text></g><g><rect x="340" y="150" width="130" height="100" rx="18" fill="#111c35" stroke="#0891b2" stroke-width="2"/><rect x="340" y="150" width="8" height="100" rx="4" fill="#0891b2"/><text x="364" y="185" class="heading">구현</text><text class="detail"><tspan x="364" y="215">코드</tspan></text></g><g><rect x="495" y="150" width="130" height="100" rx="18" fill="#111c35" stroke="#059669" stroke-width="2"/><rect x="495" y="150" width="8" height="100" rx="4" fill="#059669"/><text x="519" y="185" class="heading">테스트</text><text class="detail"><tspan x="519" y="215">결함·결과</tspan></text></g><g><rect x="650" y="150" width="130" height="100" rx="18" fill="#111c35" stroke="#d97706" stroke-width="2"/><rect x="650" y="150" width="8" height="100" rx="4" fill="#d97706"/><text x="674" y="185" class="heading">배포</text><text class="detail"><tspan x="674" y="215">운영 버전</tspan></text></g><g><rect x="805" y="150" width="130" height="100" rx="18" fill="#111c35" stroke="#dc2626" stroke-width="2"/><rect x="805" y="150" width="8" height="100" rx="4" fill="#dc2626"/><text x="829" y="185" class="heading">유지보수</text><text class="detail"><tspan x="829" y="215">변경·개선</tspan></text></g>
  <text x="42" y="470" class="footer">암기: 요-설-구-테-배-유. 실제 프로젝트에서는 피드백이 앞 단계로 돌아갑니다.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">검증과 테스트 수준 흐름</title><desc id="desc">Verification, Validation 및 단위, 통합, 시스템, 인수 테스트</desc>
  <defs><linearGradient id="bg" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#0c4a6e"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#38bdf8"/></marker></defs>
  <rect width="1200" height="380" rx="28" fill="url(#bg)"/><text x="55" y="55" fill="#f8fafc" font-size="25" font-weight="700" font-family="sans-serif">소프트웨어 테스트 핵심 구조</text>
  <g font-family="sans-serif"><g><rect x="55" y="90" width="510" height="95" rx="18" fill="#172554" stroke="#3b82f6"/><text x="85" y="128" fill="#93c5fd" font-size="19" font-weight="700">Verification · 검증</text><text x="85" y="158" fill="#e2e8f0" font-size="15">명세대로 제품을 올바르게 만들고 있는가?</text></g><g><rect x="635" y="90" width="510" height="95" rx="18" fill="#064e3b" stroke="#10b981"/><text x="665" y="128" fill="#6ee7b7" font-size="19" font-weight="700">Validation · 확인</text><text x="665" y="158" fill="#e2e8f0" font-size="15">사용자가 원하는 올바른 제품을 만들었는가?</text></g></g>
  <g font-family="sans-serif" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc"><g fill="#1e293b" stroke="#38bdf8"><rect x="55" y="245" width="210" height="70" rx="16"/><rect x="345" y="245" width="210" height="70" rx="16"/><rect x="635" y="245" width="210" height="70" rx="16"/><rect x="925" y="245" width="210" height="70" rx="16"/></g><text x="160" y="287">Unit Test · 단위</text><text x="450" y="287">Integration Test · 통합</text><text x="740" y="287">System Test · 시스템</text><text x="1030" y="287">Acceptance Test · 인수</text></g>
  <g stroke="#38bdf8" stroke-width="3" marker-end="url(#a)"><path d="M270 280h67"/><path d="M560 280h67"/><path d="M850 280h67"/></g><text x="55" y="350" fill="#94a3b8" font-size="14" font-family="sans-serif">범위가 모듈에서 전체 시스템과 사용자 인수로 점차 확대된다.</text>
</svg>
